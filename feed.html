<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="description" content="">
  <meta name="author" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Three Faces</title>
  <link href="diario.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <link href="feed.css" rel="stylesheet">
</head>

<body>
  <header>
    <nav class="navbar">
      <div class="navbar-container">
        <a href="index.html" class="navbar-logo">
          <img src="Resources-T3F-WEB/Images/Sprites/logo-kidneygames-png.png" alt="Kidney Games">
        </a>
        <button class="navbar-toggle">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>

        <ul class="navbar-menu">

          <li class="Navbar-link"><a target="_blank" href="index.html">THE THREE FACES</a></li>
          <li class="Navbar-link"><a href="#">DEV.BLOG</a></li>
          <li class="Navbar-link"><a href="#">FEED</a></li>
          <li class="Navbar-link"><a href="#">SUPPORT</a></li>
          <i class="fa fa-bars"></i>
        </ul>
      </div>
    </nav>
  </header>

  <section class="rankingContainer">
    <h3>RANKING DE PUNTUACIONES!</h3>
    <table class="taulaRecords">
        <thead>
            <tr>
                <th>Posición</th>
                <th>Puntuación</th>
                <th>Jugador</th>
            </tr>
        </thead>
        <tbody id="cuerpoRanking">
            <!-- Los datos se inyectarán aquí con JavaScript -->
        </tbody>
    </table>
</section>

  <script src="javaScript/script.js"></script>

  <section class="form">
    <div class="tituloForm">
        <h4>DINOS LO QUE PIENSAS</h4>
    </div>
    
    <div class="comentarioContainer">
        <form id="commentForm">
            <label for="nombre">Nombre usuario</label><br>
            <input type="text" id="nombre" required>

            <label for="comentario">Comentario:</label>
            <textarea id="comentario" rows="4" cols="50" required></textarea>
            
            <button type="submit" class="submitButton">Enviar comentario</button>
        </form>
    </div>
</section>

<section class="containerComentarios">
  <h4>Mira lo que los otros estan diciendo!</h4>
  <table class="tablaComentarios">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Comentario</th>
      </tr>
    </thead>
    <tbody id="verComentarios">

    </tbody>

  </table>


</section>
</body>

</html>
